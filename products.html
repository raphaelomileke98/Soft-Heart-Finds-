<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mary's Store</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #F4C2C2;
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        h1 {
            margin-bottom: 10px;
        }

        #cart {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        #anchor {
            margin-bottom: 30px;
        }

        .anchor {
            text-decoration: none;
            color: black;
            font-weight: bold;
            margin: 10px;
        }

        section {
            margin-top: 40px;
        }

        .product-card {
            display: inline-block;
            width: 220px;
            background: white;
            margin: 10px;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            vertical-align: top;
        }

        .products {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
        }

        .product_name {
            font-weight: bold;
            font-size: 18px;
        }

        .price {
            color: green;
            font-weight: bold;
            font-size: 18px;
        }

        .cart-btn {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background-color: hotpink;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .cart-btn:hover {
            opacity: 0.9;
        }
    </style>
</head>

<body>

    <h1>🛍️ PRODUCTS</h1>

    <div id="cart">
    🛒 Cart:
    <span id="cart-count">0</span>
    <br><br>
    
    <a href="carts.html">
        <button class="cart-btn">
            View Cart
        </button>
    </a>
    
</div>

    <nav id="anchor">
        <a class="anchor" href="#Fashion">Fashion</a>
        <a class="anchor" href="#Beauty">Beauty</a>
        <a class="anchor" href="#Lifestyle">Lifestyle</a>
    </nav>

    <section id="Fashion">
        <h2>Fashion & Accessories</h2>

        <div class="product-card">
            <img src="hair_clip.jpg" class="products" alt="Hair Clip">
            <p class="product_name">Hair Clips</p>
            <p class="price">₦3500</p>
            <button class="cart-btn">Add to Cart</button>
        </div>

        <div class="product-card">
            <img src="satinbonnet.jpg" class="products" alt="Satin Bonnet">
            <p class="product_name">Satin Bonnet</p>
            <p class="price">₦3000</p>
            <button class="cart-btn">Add to Cart</button>
        </div>

        <div class="product-card">
            <img src="shoulder_bag.jpg" class="products" alt="Shoulder Bag">
            <p class="product_name">Shoulder Bag</p>
            <p class="price">₦5000</p>
            <button class="cart-btn">Add to Cart</button>
        </div>
    </section>

    <section id="Beauty">
        <h2>Beauty & Skincare</h2>

        <div class="product-card">
            <img src="peach_scrub.jpg" class="products" alt="Peach Scrub">
            <p class="product_name">Peach Scrub</p>
            <p class="price">₦1000</p>
            <button class="cart-btn">Add to Cart</button>
        </div>

        <div class="product-card">
            <img src="peeloff.jpg" class="products" alt="Peel Off">
            <p class="product_name">Peel Off</p>
            <p class="price">₦1500</p>
            <button class="cart-btn">Add to Cart</button>
        </div>

        <div class="product-card">
            <img src="pimples_patches.jpg" class="products" alt="Pimples Patches">
            <p class="product_name">Pimples Patches</p>
            <p class="price">₦2500</p>
            <button class="cart-btn">Add to Cart</button>
        </div>
    </section>

    <section id="Lifestyle">
        <h2>Lifestyle & Essentials</h2>

        <div class="product-card">
            <img src="minifan.jpg" class="products" alt="Mini Fan">
            <p class="product_name">Mini Fan</p>
            <p class="price">₦3000</p>
            <button class="cart-btn">Add to Cart</button>
        </div>

        <div class="product-card">
            <img src="tumbler.jpg" class="products" alt="Tumbler">
            <p class="product_name">Cool Tumbler</p>
            <p class="price">₦11000</p>
            <button class="cart-btn">Add to Cart</button>
        </div>

        <div class="product-card">
            <img src="phonestand.jpg" class="products" alt="Phone Stand">
            <p class="product_name">Phone Stand</p>
            <p class="price">₦3000</p>
            <button class="cart-btn">Add to Cart</button>
        </div>
    </section>
<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

document.getElementById("cart-count").textContent =
cart.reduce((sum,item)=>sum+item.quantity,0);

const buttons = document.querySelectorAll(".cart-btn");

buttons.forEach(button=>{

    button.addEventListener("click",function(){

        const card = this.parentElement;

        const name =
        card.querySelector(".product_name").innerText;

        const price =
        Number(
            card.querySelector(".price")
            .innerText
            .replace("₦","")
        );

        const existing =
        cart.find(item=>item.name===name);

        if(existing){
            existing.quantity++;
        }else{
            cart.push({
                name:name,
                price:price,
                quantity:1
            });
        }

        localStorage.setItem(
            "cart",
            JSON.stringify(cart)
        );

        document.getElementById("cart-count")
        .textContent =
        cart.reduce((sum,item)=>sum+item.quantity,0);

        this.textContent="Added ✓";

        setTimeout(()=>{
            this.textContent="Add to Cart";
        },1000);

    });

});

</script>

</body>

</html>
